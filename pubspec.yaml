name: open_fit_data
description: "Local-first health & fitness data vault. Archive, export and AI-ready briefings from Health Connect / Apple Health."
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"
  flutter: ">=3.22.0"

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.5.1

  # Local storage (Drift = type-safe layer over SQLite)
  drift: ^2.18.0
  sqlite3_flutter_libs: ^0.5.24
  path_provider: ^2.1.3
  path: ^1.9.0

  # Health data (Health Connect on Android, HealthKit on iOS)
  health: ^13.3.1

  # Background auto-sync
  workmanager: ^0.9.0+3

  # Charts (trends)
  fl_chart: ^0.68.0
  smooth_charts: ^0.0.3

  # Material motion (page transitions, container transform)
  animations: ^2.0.11

  # Export & sharing
  share_plus: ^12.0.2
  file_picker: ^8.1.2
  csv: ^6.0.0
  archive: ^3.6.1

  # Formatting
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

  # Drift code generation
  drift_dev: ^2.18.0
  build_runner: ^2.4.11

  # App icon & splash screen generation
  flutter_launcher_icons: ^0.14.1
  flutter_native_splash: ^2.4.1

flutter:
  uses-material-design: true
  assets:
    - assets/logo.png

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/logo.png"
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/logo.png"
  remove_alpha_ios: true
  min_sdk_android: 26

flutter_native_splash:
  color: "#FFFFFF"
  image: "assets/logo.png"
  color_dark: "#121417"
  image_dark: "assets/logo.png"
  android_12:
    image: "assets/logo.png"
    icon_background_color: "#FFFFFF"
    image_dark: "assets/logo.png"
    icon_background_color_dark: "#121417"
  android: true
  ios: true
