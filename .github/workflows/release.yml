name: Release APK

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Installa dipendenze
        run: flutter pub get

      - name: Codegen Drift
        run: flutter pub run build_runner build --delete-conflicting-outputs

      - name: Decodifica keystore di firma
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > android/upload-keystore.jks

      - name: Scrivi key.properties
        env:
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
        run: |
          cat > android/key.properties <<EOF
          storePassword=$ANDROID_KEYSTORE_PASSWORD
          keyPassword=$ANDROID_KEY_PASSWORD
          keyAlias=$ANDROID_KEY_ALIAS
          storeFile=upload-keystore.jks
          EOF

      - name: Build APK release firmata
        run: flutter build apk --release

      - name: Rinomina APK con versione del tag
        run: cp build/app/outputs/flutter-apk/app-release.apk OpenFitData-${{ github.ref_name }}.apk

      - name: Crea GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: OpenFitData-${{ github.ref_name }}.apk
          generate_release_notes: true
